name: CI

# Runs on pushes to main and on every pull request
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        run: mypy

  # Guards the "zero-dependency core" contract for real: installs the
  # package with no extras and runs the pure-Python tests without numpy.
  core-no-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the core with no extras
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Ensure numpy is absent
        run: python -c "import importlib.util, sys; sys.exit(1 if importlib.util.find_spec('numpy') else 0)"

      - name: Import and run the pure-Python tests
        run: |
          python -c "import dataloom_engine"
          pytest tests/test_optional.py tests/test_config.py tests/test_sinks.py

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with pytest
        run: |
          pytest --cov=dataloom_engine

  # Experimental (not a required check): validates that the engine's
  # thread-safety holds on free-threaded Python (PEP 703), where the
  # GIL no longer serializes the Weavers.
  free-threaded:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up free-threaded Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14t"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with the GIL disabled
        env:
          PYTHON_GIL: "0"
        run: python -m pytest -q
