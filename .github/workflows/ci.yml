name: CI

# Roda quando faz push na main ou abre um Pull Request
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        run: mypy

  # Garante o contrato "zero-dependency core" de verdade: instala o pacote
  # sem nenhum extra e roda a suíte puro-Python num ambiente sem numpy.
  core-no-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the core with no extras
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Ensure numpy is absent
        run: python -c "import importlib.util, sys; sys.exit(1 if importlib.util.find_spec('numpy') else 0)"

      - name: Import and run the pure-Python tests
        run: |
          python -c "import dataloom_engine"
          pytest tests/test_optional.py tests/test_config.py tests/test_sinks.py

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with pytest
        run: |
          pytest --cov=dataloom_engine
