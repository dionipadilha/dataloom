name: Publish to PyPI

# Dispara quando um release é publicado no GitHub.
# Usa Trusted Publishing (OIDC): sem tokens ou senhas armazenados.
# Pré-requisito (uma única vez): cadastrar este repositório como
# "pending publisher" do projeto dataloom-engine em
# https://pypi.org/manage/account/publishing/
#   - Project name: dataloom-engine
#   - Owner: dionipadilha / Repository: dataloom
#   - Workflow: publish.yml / Environment: pypi
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Evita publicar no PyPI uma versão diferente da que a tag anuncia
      - name: Verify release tag matches pyproject version
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Release tag '${GITHUB_REF_NAME}' does not match pyproject version '${version}' (expected 'v${version}')." >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Obrigatório para o Trusted Publishing (OIDC)
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
